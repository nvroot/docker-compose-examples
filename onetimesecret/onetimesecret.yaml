x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  onetimesecret:
    image: 'onetimesecret/onetimesecret:latest'
    restart: unless-stopped
    container_name: onetimesecret
    environment:
      - AUTH_ENABLED=true
      - AUTH_SIGNUP=true
      - AUTH_SIGNIN=true
      - AUTH_AUTOVERIFY=true
      - COLONEL=admin@site.com
      - HOST=notes.site.com
      - RACK_ENV=production
      - REDIS_URL=redis://:changeme@onetimesecret-redis:6379/0
      - SECRET=secret
      - SSL=true
      - BUNDLE_INSTALL=true
    networks:
      - onetimesecret-network
      - proxy
    volumes:
      - "onetimesecret-data:/app"
    depends_on:
      - onetimesecret-redis
    healthcheck:
      test:
        - CMD
        - ruby
        - '-rnet/http'
        - '-e'
        - "exit(Net::HTTP.get_response(URI('http://localhost:3000')).is_a?(Net::HTTPSuccess) ? 0 : 1)"
      <<: *default-healthcheck
  onetimesecret-redis:
    image: redis:7-alpine
    command: redis-server --requirepass changeme
    restart: unless-stopped
    volumes:
      - "onetimesecret-redis:/data"
    networks:
      - onetimesecret-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *default-healthcheck
networks:
  onetimesecret-network:
    name: onetimesecret-network
    driver: bridge
  proxy:
    external: true
volumes:
  onetimesecret-data:
  onetimesecret-redis: