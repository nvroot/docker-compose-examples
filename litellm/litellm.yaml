x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  litellm:
    image: 'ghcr.io/berriai/litellm-database:main-stable'
    container_name: litellm
    restart: unless-stopped
    command:
      - '--config=/app/config.yaml'
      - '--port=4000'
      - '--num_workers=8'
    expose: 
      - 4000
    env_file: .env
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    networks:
      - litellm-network
      - proxy
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f litellm" ]
      <<: *default-healthcheck
  litellm-db:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    volumes:
      - litellm-pg:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - litellm-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      <<: *default-healthcheck
networks:
  litellm-network:
    name: litellm-network
    driver: bridge
  proxy:
    external: true
volumes:
  litellm-pg:
    name: litellm-pg
    driver: local