x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  windmill-server:
    image: ghcr.io/windmill-labs/windmill:main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://wind:changeme@windmill-db/windmill
      - MODE=server
      - 'BASE_URL=https://wind.site.com'
    expose:
      - 8000
    networks:
      - windmill-network
      - proxy
    volumes:
      - worker-logs:/tmp/windmill/logs
    depends_on:
      windmill-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      <<: *default-healthcheck
  windmill-db:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 1g
    volumes:
      - windmill-pg:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=wind
      - POSTGRES_DB=windmill
    networks:
      - windmill-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 15s
  windmill-worker-1:
    image: ghcr.io/windmill-labs/windmill:main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://wind:changeme@windmill-db/windmill
      - MODE=worker
      - WORKER_GROUP=default
    networks:
      - windmill-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker-cache:/tmp/windmill/cache
      - worker-logs:/tmp/windmill/logs
    depends_on:
      windmill-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      <<: *default-healthcheck

  windmill-worker-2:
    image: ghcr.io/windmill-labs/windmill:main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://wind:changeme@windmill-db/windmill
      - MODE=worker
      - WORKER_GROUP=default
    networks:
      - windmill-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker-cache:/tmp/windmill/cache
      - worker-logs:/tmp/windmill/logs
    depends_on:
      windmill-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      <<: *default-healthcheck

  windmill-worker-3:
    image: ghcr.io/windmill-labs/windmill:main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://wind:changeme@windmill-db/windmill
      - MODE=worker
      - WORKER_GROUP=default
    networks:
      - windmill-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker-cache:/tmp/windmill/cache
      - worker-logs:/tmp/windmill/logs
    depends_on:
      windmill-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      <<: *default-healthcheck

  windmill-worker-native:
    image: ghcr.io/windmill-labs/windmill:main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://wind:changeme@windmill-db/windmill
      - MODE=worker
      - WORKER_GROUP=native
      - NUM_WORKERS=8
      - SLEEP_QUEUE=200
    networks:
      - windmill-network
    volumes:
      - worker-logs:/tmp/windmill/logs
    depends_on:
      windmill-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      <<: *default-healthcheck

  windmill_worker_reports:
    image: ghcr.io/windmill-labs/windmill:main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://wind:changeme@windmill-db/windmill
      - MODE=worker
      - WORKER_GROUP=reports
    networks:
      - windmill-network
    depends_on:
      windmill-db:
        condition: service_healthy
    volumes:
      - worker-cache:/tmp/windmill/cache
      - worker-logs:/tmp/windmill/logs
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      <<: *default-healthcheck

  windmill_extra:
    image: ghcr.io/windmill-labs/windmill-extra:latest
    restart: unless-stopped
    networks:
      - windmill-network
    expose:
      - 3001 # LSP
      - 3002 # Multiplayer
      - 3003 # Debugger
    environment:
      - ENABLE_LSP=true
      - ENABLE_MULTIPLAYER=false # Set to true to enable multiplayer (Enterprise Edition)
      - ENABLE_DEBUGGER=true # Set to true to enable debugger
      - DEBUGGER_PORT=3003 # Debugger service port
      - ENABLE_NSJAIL=false # Set to true for nsjail sandboxing (requires privileged: true)
      - REQUIRE_SIGNED_DEBUG_REQUESTS=true # Require backend-signed JWT tokens for debug sessions. Do NOT set to false on any internet-reachable deployment: it exposes an unauthenticated code-execution debugger.
      - WINDMILL_BASE_URL=http://windmill_server:8000
      # - DEBUG_ALLOWED_ORIGINS=https://your-windmill-host # Optional CSWSH hardening: comma-separated allowlist of browser Origins permitted to open debug WebSockets
    volumes:
      - lsp-cache:/pyls/.cache
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      <<: *default-healthcheck

networks:
  windmill-network:
    name: windmill-network
    driver: bridge
  proxy:
    external: true
volumes:
  lsp-cache:
  windmill-pg:
  worker-logs:
  worker-cache: