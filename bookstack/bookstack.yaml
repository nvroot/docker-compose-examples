services:
  bookstack:
    image: 'linuxserver/bookstack:latest'
    restart: unless-stopped
    environment:
      - 'APP_URL=https://wiki.example.com'
      - 'APP_KEY=app-key'
      - PUID=1000
      - PGID=1000
      - 'TZ=UTC'
      - DB_HOST=mariadb
      - DB_PORT=3306
      - 'DB_USERNAME=bookstack-user'
      - 'DB_PASSWORD=changeme'
      - 'DB_DATABASE=bookstack'
      - 'MAIL_DRIVER=smtp'
      - 'MAIL_HOST=smtp.example.com'
      - 'MAIL_PORT=465'
      - 'MAIL_ENCRYPTION=ssl'
      - 'MAIL_USERNAME=admin@example.com'
      - 'MAIL_PASSWORD=mail-password'
      - 'MAIL_FROM=admin@example.com'
      - 'MAIL_FROM_NAME=BookStack'
    volumes:
      - 'bookstack-data:/config'
    networks:
      - proxy
      - bookstack-network
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -f http://127.0.0.1:80/'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    depends_on:
      mariadb:
        condition: service_healthy
  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - 'TZ=UTC'
      - 'MYSQL_ROOT_PASSWORD=changeme'
      - 'MYSQL_DATABASE=bookstack'
      - 'MYSQL_USER=bookstack-user'
      - 'MYSQL_PASSWORD=changeme'
    volumes:
      - 'bookstack-db:/config'
    networks:
      - bookstack-network
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-h'
        - 127.0.0.1
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  bookstack-network:
    name: bookstack-network
    driver: bridge
  proxy:
    external: true
volumes:
  bookstack-data:
  bookstack-db: