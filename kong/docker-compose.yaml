x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s

services:
  kong-database:
    image: postgres:18
    container_name: kong-database
    restart: unless-stopped
    networks:
      - kong-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432
    volumes:
      - kong-datastore:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      <<: *default-healthcheck

  kong-migration:
    image: kong:latest
    container_name: kong-migration
    command: kong migrations bootstrap
    networks:
      - kong-network
    restart: on-failure
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_DATABASE=${POSTGRES_DB}
      - KONG_PG_USER=${POSTGRES_USER}
      - KONG_PG_PASSWORD=${POSTGRES_PASSWORD}
      - 'KONG_ADMIN_GUI_URL=${KONG_ADMIN_GUI_URL}'
      - 'KONG_ADMIN_GUI_API_URL=${KONG_ADMIN_GUI_API_URL}'
      - 'KONG_ADMIN_GUI_PATH=/'
    depends_on:
      kong-database:
        condition: service_healthy

  kong:
    image: kong:latest
    container_name: kong
    restart: unless-stopped
    networks:
      - kong-network
      - proxy
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_DATABASE=${POSTGRES_DB}
      - KONG_PG_USER=${POSTGRES_USER}
      - KONG_PG_PASSWORD=${POSTGRES_PASSWORD}
      - 'KONG_PROXY_ACCESS_LOG=/dev/stdout'
      - 'KONG_ADMIN_ACCESS_LOG=/dev/stdout'
      - 'KONG_PROXY_ERROR_LOG=/dev/stderr'
      - 'KONG_ADMIN_ERROR_LOG=/dev/stderr'
      - 'KONG_ADMIN_GUI_URL=${KONG_ADMIN_GUI_URL}'
      - 'KONG_ADMIN_GUI_API_URL=${KONG_ADMIN_GUI_API_URL}'
      - 'KONG_ADMIN_GUI_PATH=/admin'
      - 'KONG_PROXY_LISTEN=0.0.0.0:8000, 0.0.0.0:8443 ssl'
      - 'KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl'
      - 'KONG_ADMIN_GUI_LISTEN=0.0.0.0:8002, 0.0.0.0:8445 ssl'
      - 'KONG_ADMIN_GUI_LISTEN=0.0.0.0:8002, 0.0.0.0:8445 ssl'
      - 'KONG_TRUSTED_IPS=0.0.0.0/0,::/0'
      - 'KONG_REAL_IP_HEADER=X-Real-IP'
      - 'KONG_REAL_IP_RECURSIVE=on'
    expose:
      - 8000   # Proxy HTTP
      - 8443   # Proxy HTTPS
      - 8001   # Admin API HTTP
      - 8444   # Admin API HTTPS
      - 8002   # Kong Manager HTTP
      - 8445   # Kong Manager HTTPS
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      <<: *default-healthcheck

networks:
  kong-network:
    name: kong-network
    driver: bridge
  proxy:
    external: true
volumes:
  kong-datastore:
    driver: local