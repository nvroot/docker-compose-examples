networks:
  mcpnet-network:
    name: mcpnet-network
    driver: bridge
  proxy:
    external: true
volumes:
  mcpnet-pgdata:
    name: mcpnet-pgdata
    driver: local
  mcpnet-pgadmindata:
    name: mcpnet-pgadmindata
    driver: local
  mcpnet-redisinsight:
    name: mcpnet-redisinsight
    driver: local