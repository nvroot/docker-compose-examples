services:
  voyager:
    image: nvroot/voyager:latest
    container_name: voyager
    restart: unless-stopped
    expose:
      - 9090
    volumes:
      - './data:/app/data'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/voyager"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    networks:
      - proxy
networks:
  proxy:
    external: true