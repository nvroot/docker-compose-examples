services:
  bytebase:
    image: bytebase/bytebase:latest
    container_name: bytebase
    restart: unless-stopped
    expose:
      - 8080
    environment:
      - PG_URL=postgres://bytebase-user:changeme@bytebase-db:5432/bytebase
    command:
      - "--data"
      - "/var/opt/bytebase"
      - "--port"
      - "8080"
      - "--disallow-signup"
    networks:
      - proxy
      - bytebase-network
    volumes:
      - bytebase-data:/var/opt/bytebase
    depends_on:
      bytebase-db:
        condition: service_healthy
  bytebase-db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_DB=bytebase
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=bytebase-user
      - POSTGRES_PORT=5432
    volumes:
      - "bytebase-pg:/var/lib/postgresql/data"
    networks:
      - bytebase-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
  bytebase-network:
    name: bytebase-network
    driver: bridge
volumes:
  bytebase-data:
  bytebase-pg: