services:
  drawdb:
    image: ghcr.io/drawdb-io/drawdb:latest
    container_name: drawdb
    restart: unless-stopped
    expose:
      - 80
    environment:
      - VITE_BACKEND_URL=https://drawdb.site.com
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true