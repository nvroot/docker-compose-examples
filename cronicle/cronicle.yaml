services:
  cronicle:
    image: elestio/cronicle:latest
    container_name: cronicle
    hostname: cronicle
    restart: unless-stopped
    entrypoint: manager
    environment:
        - CRONICLE_manager=1
        - CRONICLE_secret_key=secretkey
    expose:
        - 3012
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/opt/cronicle/data
      - ./logs:/opt/cronicle/logs
      - ./plugins:/opt/cronicle/plugins
      - ./workloads/app:/app
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3012/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true