services:
  web-check:
    container_name: webcheck
    image: lissy93/web-check
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - 3000
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://127.0.0.1:3000/'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
