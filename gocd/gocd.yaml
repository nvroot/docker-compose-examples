services:
  gocd-server:
    image: gocd/gocd-server:v24.3.0
    container_name: gocd
    restart: unless-stopped
    expose:
      - 8153
    volumes:
      - gocd-data:/godata
      - gocd-home:/home/go
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f gocd || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  gocd-data:
  gocd-home: