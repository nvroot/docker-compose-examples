x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
x-env: &env
  image: glitchtip/glitchtip:latest
  restart: unless-stopped
  environment:
    - 'POSTGRES_USER=${POSTGRES_USER}'
    - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    - 'POSTGRES_DB=${POSTGRES_DB}'
    - 'DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}'
    - 'SECRET_KEY=${SECRET_KEY}'
    - 'EMAIL_URL=${EMAIL_URL}'
    - 'DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}'
    - 'GLITCHTIP_MAX_EVENT_LIFE_DAYS=${GLITCHTIP_MAX_EVENT_LIFE_DAYS}'
    - 'GLITCHTIP_MAX_TRANSACTION_EVENT_LIFE_DAYS=${GLITCHTIP_MAX_TRANSACTION_EVENT_LIFE_DAYS}'
    - 'GLITCHTIP_MAX_FILE_LIFE_DAYS=${GLITCHTIP_MAX_FILE_LIFE_DAYS}'
    - 'GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN}'
    - 'REDIS_URL=${REDIS_URL}'
    - 'CELERY_WORKER_AUTOSCALE=${CELERY_WORKER_AUTOSCALE}'
    - 'CELERY_WORKER_MAX_TASKS_PER_CHILD=${CELERY_WORKER_MAX_TASKS_PER_CHILD}'
    - 'ENABLE_USER_REGISTRATION=${ENABLE_USER_REGISTRATION}'
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
services:
  postgres:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    environment:
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
    volumes:
      - 'pg-data:/var/lib/postgresql/data'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      <<: *default-healthcheck
  redis:
    image: 'redis:8-alpine'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      <<: *default-healthcheck
  web:
    <<: *env
    volumes:
      - 'uploads:/code/uploads'
    expose: [8000]
    healthcheck:
      test: [ "CMD", "echo", "health" ]
      <<: *default-healthcheck
  worker:
    <<: *env
    command: ./bin/run-celery-with-beat.sh
    volumes:
      - 'uploads:/code/uploads'
    healthcheck:
      test: [ "CMD", "echo", "health" ]
      <<: *default-healthcheck
  migrate:
    <<: *env
    restart: 'no'
    command: './manage.py migrate'
volumes:
  pg-data:
  uploads: