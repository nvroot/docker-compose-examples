services:
  flipt:
    image: 'ghcr.io/flipt-io/flipt:latest'
    container_name: flipt
    restart: unless-stopped
    volumes:
      - 'flipt-data:/var/opt/flipt'
    expose:
      - 8080
    networks:
      - proxy
    healthcheck:
      test:
        - CMD
        - wget
        - '--spider'
        - '--quiet'
        - 'http://127.0.0.1:8080'
      interval: 60s
      timeout: 20s
      retries: 15
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  flipt-data: