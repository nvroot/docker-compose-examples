name: supabase
x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
x-env: &env
  depends_on:
    db:
      condition: service_healthy
services:
  minio:
    image: minio/minio
    restart: unless-stopped
    expose:
      - '9000'
      - '9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server --console-address ":9001" /data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://minio:9000/minio/health/live" ]
      <<: *default-healthcheck
    volumes:
      - ./volumes/storage:/data:z

  minio-createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set supa-minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb supa-minio/stub;
      exit 0;
      "
  storage:
    container_name: supabase-storage
    image: supabase/storage-api:v1.33.0
    volumes:
      - ./volumes/storage:/var/lib/storage:z
    depends_on:
      db:
        # Disable this if you are using an external Postgres database
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
      minio:
        condition: service_healthy
    expose:
      - 5000
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "node" ]
      <<: *default-healthcheck
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: stub
      GLOBAL_S3_ENDPOINT: http://minio:9000
      GLOBAL_S3_PROTOCOL: http
      GLOBAL_S3_FORCE_PATH_STYLE: true
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: stub
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      # TODO: https://github.com/supabase/storage-api/issues/55
      REGION: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: supabase-imgproxy
    ports: !reset []
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "imgproxy", "health" ]
      <<: *default-healthcheck
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION}
  studio:
    image: supabase/studio:2025.12.17-sha-43f4f7f
    ports: !reset []
    depends_on: !reset []
    environment:
      NEXT_PUBLIC_ENABLE_LOGS: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://studio:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})"
        ]
      <<: *default-healthcheck
  kong:
    image: kong:2.8.1
    ports: !reset []
    depends_on: !reset []
    expose:
      - 8000/tcp
      - 8443/tcp
  auth:
    image: supabase/gotrue:v2.184.0
    ports: !reset []
    <<: *env
    depends_on: !reset []
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9999/health"
        ]
      <<: *default-healthcheck
  rest:
    image: postgrest/postgrest:v14.1
    ports: !reset []
    <<: *env
    depends_on: !reset []
    healthcheck:
      test:
        [ "CMD", "postgrest", "-v" ]
      <<: *default-healthcheck
  realtime:
    image: supabase/realtime:v2.68.0
    ports: !reset []
    <<: *env
    depends_on: !reset []
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sSfL",
          "--head",
          "-o",
          "/dev/null",
          "-H",
          "Authorization: Bearer ${ANON_KEY}",
          "http://localhost:4000/api/tenants/realtime-dev/health"
        ]
      <<: *default-healthcheck
  meta:
    image: supabase/postgres-meta:v0.95.1
    ports: !reset []
    <<: *env
    depends_on: !reset []
  functions:
    image: supabase/edge-runtime:v1.69.28
    ports: !reset []
    depends_on: !reset []
    healthcheck:
      test:
        [ "CMD", "echo", "health" ]
      <<: *default-healthcheck
  db:
    image: supabase/postgres:15.8.1.085
    ports: !reset []
    depends_on: !reset []
    healthcheck:
      test:
        [
        "CMD",
        "pg_isready",
        "-U",
        "postgres",
        "-h",
        "localhost"
        ]
      <<: *default-healthcheck
  supavisor:
    image: supabase/supavisor:2.7.4
    ports: !reset []
    <<: *env
    depends_on: !reset []
    expose:
      - ${POSTGRES_PORT}
      - ${POOLER_PROXY_PORT_TRANSACTION}
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sSfL",
          "--head",
          "-o",
          "/dev/null",
          "http://127.0.0.1:4000/api/health"
        ]
      <<: *default-healthcheck
  analytics:
    profiles: ["useless"]
  vector:
    profiles: ["useless"]