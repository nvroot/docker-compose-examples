services:
  duplicati:
    image: linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - 'SETTINGS_ENCRYPTION_KEY=encryption-key'
      - 'DUPLICATI__WEBSERVICE_PASSWORD=webservice-password'
    expose:
      - 8200
    volumes:
      - duplicati-config:/config
      - duplicati-backups:/backups
      - duplicati-source:/source
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8200"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  duplicati-config:
  duplicati-backups:
  duplicati-source: