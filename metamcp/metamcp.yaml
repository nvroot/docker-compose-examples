name: metamcp
x-default-healthcheck: &default-healthcheck
  interval: 120s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  metamcp:
    container_name: metamcp
    image: ghcr.io/metatool-ai/metamcp:latest
    restart: unless-stopped
    expose:
      - 12008
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    networks:
      - metamcp-network
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      <<: *default-healthcheck
  postgres:
    image: postgres:17-alpine
    container_name: metamcp-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - 5432
    networks:
      - metamcp-network
    volumes:
      - metamcp-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metamcp_user} -d ${POSTGRES_DB:-metamcp_db}"]
      <<: *default-healthcheck
volumes:
  metamcp-db:
    name: metamcp-db
    driver: local
networks:
  metamcp-network:
    name: metamcp-network
    driver: bridge
  proxy:
    external: true