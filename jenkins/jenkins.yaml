services:
  jenkins:
    image: 'jenkins/jenkins:latest'
    container_name: jenkins
    restart: unless-stopped
    expose:
      - 8080
      - 50000
    volumes:
      - 'jenkins-data:/var/jenkins_home:rw'
      - '/var/run/docker.sock:/var/run/docker.sock'
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  jenkins-data: