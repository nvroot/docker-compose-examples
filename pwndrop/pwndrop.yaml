services:
  pwndrop:
    image: linuxserver/pwndrop:latest
    container_name: pwndrop
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SECRET_PATH=pwndrop
    expose:
      - 8080
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - pwndrop-data:/config
    networks:
      - proxy
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:8080'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  pwndrop-data: