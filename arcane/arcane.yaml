services:
  arcane:
    image: ghcr.io/ofkm/arcane:latest
    container_name: arcane
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - PUID=1000 # User ID for the 'arcane' user inside the container. Defaults to 1000.
      - PGID=1000 # Group ID for the 'arcane' group inside the container. Defaults to 1000.
      - PUBLIC_SESSION_SECRET=secret # openssl rand -base64 32
    networks:
      - proxy
    expose:
      - 3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./arcane-data:/app/data
      - /home/ubuntu:/opt/my-docker-stacks:ro
networks:
  proxy:
    external: true