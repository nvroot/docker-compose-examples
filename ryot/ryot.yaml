services:
  ryot:
    image: ignisda/ryot:v10
    container_name: ryot
    restart: unless-stopped
    environment:
      - 'DATABASE_URL=postgres://ryot-user:changeme@ryot-db:5432/ryot'
      - 'SERVER_ADMIN_ACCESS_TOKEN=accesstoken'
      - 'DISABLE_TELEMETRY=true'
      - 'TZ=Asia/Baku'
      - 'USERS_ALLOW_REGISTRATION=false'
      - 'FRONTEND_URL=https://ryot.example.com'
    expose:
      - 8000
    networks:
      - proxy
      - ryot-network
    depends_on:
      ryot-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  ryot-db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - ryot-pg:/var/lib/postgresql
    environment:
      - 'POSTGRES_USER=ryot-user'
      - 'POSTGRES_PASSWORD=changeme'
      - 'POSTGRES_DB=ryot'
      - 'TZ=Asia/Baku'
    networks:
      - ryot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
  ryot-network:
    name: ryot-network
    driver: bridge
volumes:
  ryot-pg: