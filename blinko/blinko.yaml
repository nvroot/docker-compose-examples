x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  blinko:
    image: blinkospace/blinko:latest
    container_name: blinko
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=https://blinko.site.com
      - NEXT_PUBLIC_BASE_URL=https://blinko.site.com
      - NEXTAUTH_SECRET=my_ultra_secure_nextauth_secret
      - DATABASE_URL=postgresql://blinko-user:changeme@blinko-db:5432/blinko
    depends_on:
      blinko-db:
        condition: service_healthy
    networks:
      - proxy
      - blinko-network
    expose:
      - 1111
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://blinko:1111/"]
      <<: *default-healthcheck
  blinko-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=blinko
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=blinko-user
      - POSTGRES_PORT=5432
      - TZ=Asia/Baku
    volumes:
      - "blinko-pg:/var/lib/postgresql/data"
    networks:
      - blinko-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      <<: *default-healthcheck
networks:
    proxy:
      external: true
    blinko-network:
      name: blinko-network
      driver: bridge
volumes:
  blinko-pg: