services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://umami-user:changeme@postgresql:5432/umami
      - DATABASE_TYPE=postgres
      - APP_SECRET=app-secret
    expose:
      - 3000
    networks:
      - proxy
      - umami-network
    init: true
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/heartbeat"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - umami-pg:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=umami-user
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=umami
    networks:
      - umami-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
  umami-network:
    name: umami-network
    driver: bridge
volumes:
  umami-pg: