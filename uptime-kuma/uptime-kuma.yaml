services:
  uptime-kuma:
    image: louislam/uptime-kuma:beta
    container_name: uptime-kuma
    restart: unless-stopped
    expose:
      - 3001
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  uptime-kuma-data: