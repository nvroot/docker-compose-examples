services:
  rabbitmq:
    image: 'rabbitmq:4-management-alpine'
    hostname: rabbitmq
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - 'RABBITMQ_DEFAULT_USER=username'
      - 'RABBITMQ_DEFAULT_PASS=password'
      - 'PORT=5672'
    ports:
      - 5672:5672
    expose:
      - 15672
    networks:
      - proxy
    healthcheck:
      test: 'rabbitmq-diagnostics -q ping'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    volumes:
      - 'rabbitmq-data:/var/lib/rabbitmq/'
networks:
  proxy:
    external: true
volumes:
  rabbitmq-data: