services:
  dozzle:
    image: 'amir20/dozzle:latest'
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    healthcheck:
      test:
        - CMD
        - /dozzle
        - healthcheck
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    networks:
      - proxy
networks:
  proxy:
    external: true
