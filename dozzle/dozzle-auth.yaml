services:
  dozzle:
    image: amir20/dozzle:v10.2.0
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - './data:/data'
    environment:
      DOZZLE_AUTH_PROVIDER: simple
    healthcheck:
      test:
        - CMD
        - /dozzle
        - healthcheck
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    networks:
      - proxy
networks:
  proxy:
    external: true
