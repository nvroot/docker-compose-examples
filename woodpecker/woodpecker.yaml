services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3.0.1
    container_name: woodpecker
    restart: unless-stopped
    expose:
      - 8000
      - 9000
    networks:
      - woodpecker-network
      - proxy
    volumes:
      - woodpecker-data:/var/lib/woodpecker/
    environment:
      - WOODPECKER_OPEN=true
      - 'WOODPECKER_HOST=https://woodpecker.site.com'
      - 'WOODPECKER_ADMIN=username'
      - WOODPECKER_GITHUB=true
      - WOODPECKER_GITHUB_CLIENT=client
      - WOODPECKER_GITHUB_SECRET=secret
      - WOODPECKER_AGENT_SECRET=agent-secret
      - WOODPECKER_DATABASE_DRIVER=mysql
      - WOODPECKER_DATABASE_DATASOURCE=woodpecker:changeme@tcp(woodpecker-db:3306)/woodpecker?parseTime=true
    depends_on:
      woodpecker-db:
        condition: service_healthy
  woodpecker-db:
    image: mariadb:11
    container_name: woodpecker-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_DATABASE=woodpecker
      - MYSQL_USER=woodpecker
      - MYSQL_PASSWORD=changeme
    networks:
      - woodpecker-network
    volumes:
      - woodpecker-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3.0.1
    container_name: woodpecker-agent
    command: agent
    restart: unless-stopped
    networks:
      - woodpecker-network
      - proxy
    volumes:
      - woodpecker-agent:/etc/woodpecker
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WOODPECKER_SERVER=woodpecker-server:9000
      - WOODPECKER_AGENT_SECRET=agent-secret
    depends_on:
      - woodpecker-server
volumes:
  woodpecker-data:
  woodpecker-agent:
  woodpecker-mysql:
networks:
  woodpecker-network:
    name: woodpecker-network
    driver: bridge
  proxy:
    external: true
