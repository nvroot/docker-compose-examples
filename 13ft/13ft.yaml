services:
  13ft:
    image: ghcr.io/wasi-master/13ft:latest
    container_name: 13ft
    hostname: 13ft
    restart: unless-stopped
    expose:
      - 5000
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true