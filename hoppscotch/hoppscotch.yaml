x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  hoppscotch:
    image: 'hoppscotch/hoppscotch:latest'
    container_name: hoppscotch
    restart: unless-stopped
    environment:
      - 'VITE_ALLOWED_AUTH_PROVIDERS=GITHUB'
      - 'GITHUB_CLIENT_ID=*************'
      - 'GITHUB_CLIENT_SECRET=*******************'
      - 'GITHUB_CALLBACK_URL=https://hop.example.com/backend/v1/auth/github/callback'
      - 'GITHUB_SCOPE=user:email'
      - 'DATABASE_URL=postgresql://hoppscotch-user:changeme@hoppscotch-db:5432/hoppscotch'
      - 'JWT_SECRET=somesecret'
      - 'TOKEN_SALT_COMPLEXITY=10'
      - 'MAGIC_LINK_TOKEN_VALIDITY=3'
      - 'REFRESH_TOKEN_VALIDITY=604800000'
      - 'ACCESS_TOKEN_VALIDITY=86400000'
      - 'SESSION_SECRET=session-secret-key'
      - 'ALLOW_SECURE_COOKIES=true'
      - 'DATA_ENCRYPTION_KEY=mustbeexactly32characterlikethis'
      - 'REDIRECT_URL=https://hop.example.com'
      - 'WHITELISTED_ORIGINS=https://hop.example.com/backend,https://hop.example.com,https://hop.example.com/admin'
      - 'RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60}'
      - 'RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}'
      - 'VITE_BASE_URL=https://hop.example.com'
      - 'VITE_SHORTCODE_BASE_URL=https://hop.example.com'
      - 'VITE_ADMIN_URL=https://hop.example.com/admin'
      - 'VITE_BACKEND_GQL_URL=https://hop.example.com/backend/graphql'
      - 'VITE_BACKEND_WS_URL=wss://hop.example.com/backend/graphql'
      - 'VITE_BACKEND_API_URL=https://hop.example.com/backend/v1'
      - 'VITE_APP_TOS_LINK=https://docs.hoppscotch.io/support/terms'
      - 'VITE_APP_PRIVACY_POLICY_LINK=https://docs.hoppscotch.io/support/privacy'
      - 'PROXY_APP_URL=https://pr.site.com'
      - TRUST_PROXY=true
      - VITE_PROXYSCOTCH_ACCESS_TOKEN=some-token
      - ENABLE_SUBPATH_BASED_ACCESS=true
      - ENABLE_SITE_PROTECTION=true
    command:
      [
        "sh",
        "-c",
        "pnpm exec prisma migrate deploy && node /usr/src/app/aio_run.mjs",
      ]
    expose:
      - 80
    networks:
      - hoppscotch-network
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/"]
      <<: *default-healthcheck

  hoppscotch-db:
    image: 'postgres:17'
    restart: unless-stopped
    volumes:
      - 'hopp-db:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_USER=hoppscotch-user'
      - 'POSTGRES_PASSWORD=changeme'
      - 'POSTGRES_DB=hoppscotch'
    networks:
      - hoppscotch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      <<: *default-healthcheck

  proxyscotch:
    image: 'hoppscotch/proxyscotch:latest'
    restart: unless-stopped
    container_name: proxyscotch
    environment:
      - PROXYSCOTCH_TOKEN=some-token
    expose:
      - 9159
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9159/"]
      <<: *default-healthcheck

networks:
  hoppscotch-network:
    name: hoppscotch-network
    driver: bridge
  proxy:
    external: true
volumes:
  hopp-db: