services:
  hoppscotch:
    image: 'hoppscotch/proxyscotch:latest'
    restart: unless-stopped
    environment:
      - PROXYSCOTCH_TOKEN=<token>
    expose:
      - 9159
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9159/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true