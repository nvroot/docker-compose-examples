services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    restart: unless-stopped
    command:
      - start
    environment:
      - TZ=UTC
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=password
      - KC_DB=postgres
      - KC_DB_USERNAME=keycloak-user
      - KC_DB_PASSWORD=changeme
      - KC_DB_URL_PORT=5432
      - KC_DB_URL=jdbc:postgresql://postgres/keycloak
      - KC_HOSTNAME=https://example.com
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_PROXY_ADDRESS_FORWARDING=true
    volumes:
      - keycloak-data:/opt/keycloak/data
    expose:
      - 8080
    networks:
      - proxy
      - keycloak-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost:9000\r\nConnection: close\r\n\r\n' >&3;cat <&3 | grep -q '\"status\": \"UP\"' && exit 0 || exit 1",
        ]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - keycloak-pg:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_USER=keycloak-user'
      - 'POSTGRES_PASSWORD=changeme'
      - 'POSTGRES_DB=keycloak'
    networks:
      - keycloak-network
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
  keycloak-network:
    external: true
volumes:
  keycloak-data:
  keycloak-pg:
