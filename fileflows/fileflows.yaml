services:
  fileflows:
    image: revenz/fileflows:latest
    container_name: fileflows
    restart: unless-stopped
    environment:
      - _APP_URL=https://flows.site.com
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    #devices:
    #  - "/dev/dri:/dev/dri"
    volumes:
      - fileflows_common:/app/common
      - fileflows_configs:/app/Data
      - fileflows_logs:/app/Logs
      - fileflows_temp:/temp
    expose:
      - 5000
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/system/version"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  fileflows_common:
  fileflows_configs:
  fileflows_logs:
  fileflows_temp: