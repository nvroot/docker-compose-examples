services:
  zipline:
    image: ghcr.io/diced/zipline:latest
    container_name: zipline
    restart: unless-stopped
    expose:
      - 3000
    environment:
      - 'CORE_PORT=3000'
      - 'CORE_HOSTNAME=0.0.0.0'
      - 'CORE_SECRET=mustbeexactry32characterlikethis'
      - 'DATABASE_URL=postgres://zipline-user:changeme@postgresql:5432/zipline'
      - 'DATASOURCE_TYPE=local'
      - 'DATASOURCE_LOCAL_DIRECTORY=/zipline/uploads'
    networks:
      - proxy
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - './uploads:/zipline/uploads'
      - './public:/zipline/public'
      - './themes:/zipline/themes'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postgresql:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zipline-user
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=zipline
    volumes:
      - zipline-pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  zipline-pg: