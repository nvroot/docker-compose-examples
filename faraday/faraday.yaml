services:
  faraday:
    image: faradaysec/faraday:latest
    container_name: faraday
    restart: unless-stopped
    entrypoint: /entrypoint.sh
    environment:
      - AUTHENTIK_POSTGRESQL__PASSWORD=changeme
      - PGSQL_USER=faraday-user
      - PGSQL_PASSWD=changeme
      - PGSQL_DBNAME=faraday
      - PGSQL_HOST=postgresql
      - REDIS_SERVER=redis
    volumes:
      - faraday-data:/home/faraday/.faraday:rw
    expose:
      - 5985
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - faraday-network
      - proxy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5985"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postgresql:
    image: postgres:latest
    restart: unless-stopped
    volumes:
      - faraday-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=faraday-user
      - POSTGRES_DB=faraday
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    networks:
      - faraday-network
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: '--save 60 1 --loglevel warning'
    volumes:
      - faraday-redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'redis-cli ping | grep PONG'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    networks:
      - faraday-network
networks:
  faraday-network:
    name: faraday-network
    driver: bridge
  proxy:
    external: true
volumes:
  faraday-data:
  faraday-db:
  faraday-redis: