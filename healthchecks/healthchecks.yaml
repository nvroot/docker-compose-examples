services:
  healthchecks:
    image: linuxserver/healthchecks:latest
    container_name: healthchecks
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - 'TZ=Etc/UTC'
      - 'SITE_ROOT=https://health.site.com'
      - 'SITE_NAME=My Awesome Healthcheck'
      - SUPERUSER_EMAIL=admin
      - SUPERUSER_PASSWORD=password
      - 'ALLOWED_HOSTS=health.site.com'
      - APPRISE_ENABLED=False #optional
      - 'CSRF_TRUSTED_ORIGINS=https://health.site.com'
      - DEBUG=False #optional
      - DEFAULT_FROM_EMAIL= # admin@site.com
      - EMAIL_HOST= #
      - EMAIL_PORT= # Mail Port
      - EMAIL_HOST_USER= # admin@site.com
      - EMAIL_HOST_PASSWORD= # password
      - EMAIL_USE_TLS= # True or False
      - EMAIL_USE_SSL= # True or False
      - INTEGRATIONS_ALLOW_PRIVATE_IPS= # True or False
      - PING_EMAIL_DOMAIN= #optional
      - RP_ID= #optional
      - SECRET_KEY= #optional
      - SITE_LOGO_URL= #optional
    volumes:
      - ./config:/config
    expose:
      - 8000 # UI
      - 2525 # To receive smtp
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "healthchecks"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true