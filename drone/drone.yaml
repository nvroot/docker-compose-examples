services:
  drone:
    image: drone/drone:2
    restart: unless-stopped
    container_name: drone
    volumes:
      - ./data:/data
    environment:
      - DRONE_GITHUB_CLIENT_ID=your-id
      - DRONE_GITHUB_CLIENT_SECRET=super-duper-secret
      - DRONE_RPC_SECRET=super-duper-secret
      - DRONE_SERVER_HOST=drone.site.com
      - DRONE_SERVER_PROTO=https
      - DRONE_USER_FILTER=username
    expose:
      - 80
      - 443
    detach: true
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true