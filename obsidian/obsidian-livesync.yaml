services:
  couchdb:
    image: couchdb:latest
    container_name: obsidian-livesync
    restart: unless-stopped
    user: 1000:1000
    environment:
      - COUCHDB_USER=user
      - COUCHDB_PASSWORD=changeme
    volumes:
      - ./data:/opt/couchdb/data
      - ./config/local.ini:/opt/couchdb/etc/local.ini
    expose:
      - 5984
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true