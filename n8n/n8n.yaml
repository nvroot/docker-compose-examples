services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - 'N8N_EDITOR_BASE_URL=https://n8n.site.com'
      - 'VUE_APP_URL_BASE_API=https://n8n.site.com'
      - 'WEBHOOK_URL=https://n8n.site.com'
      - 'N8N_HOST=https://n8n.site.com'
      - 'GENERIC_TIMEZONE=Asia/Baku'
      - 'TZ=Asia/Baku'
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgresql
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_SCHEMA=public
      - DB_POSTGRESDB_PASSWORD=changeme
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n-data:/home/node/.n8n
    expose:
      - 5678
    networks:
      - proxy
      - n8n-network
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postgresql:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - n8n-db:/var/lib/postgresql
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=n8n
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  n8n-network:
    name: n8n-network
    driver: bridge
  proxy:
    external: true
volumes:
  n8n-db:
  n8n-data:
