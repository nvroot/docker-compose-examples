services:
  app-prebuild:
    image: ghcr.io/stackblitz-labs/bolt.diy:latest
    container_name: bolt
    restart: unless-stopped
    expose:
      - 5173
    environment:
      - NODE_ENV=production
      - COMPOSE_PROFILES=production
      - PORT=5173
      # - OLLAMA_API_BASE_URL=http://127.0.0.1:11434
      - DEFAULT_NUM_CTX=${DEFAULT_NUM_CTX:-6144}
      - RUNNING_IN_DOCKER=true
    command: pnpm run dockerstart
    profiles:
      - prebuilt
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5173"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true