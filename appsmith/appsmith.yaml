services:
  appsmith:
    image: appsmith/appsmith-ee:latest
    container_name: appsmith
    restart: unless-stopped
    environment:
      - APPSMITH_MAIL_ENABLED=${APPSMITH_MAIL_ENABLED:-false}
      - APPSMITH_DISABLE_TELEMETRY=${APPSMITH_DISABLE_TELEMETRY:-true}
      - APPSMITH_DISABLE_INTERCOM=${APPSMITH_DISABLE_INTERCOM:-true}
      - APPSMITH_SENTRY_DSN=${APPSMITH_SENTRY_DSN}
      - APPSMITH_SMART_LOOK_ID=${APPSMITH_SMART_LOOK_ID}
    volumes:
      - ./stacks-data:/appsmith-stacks
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
