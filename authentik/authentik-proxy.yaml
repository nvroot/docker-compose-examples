services:
  authentik-outpost:
    image: ghcr.io/goauthentik/proxy:2025.4.1
    container_name: authentik-outpost
    restart: unless-stopped
    environment:
      AUTHENTIK_HOST: https://auth.site.com/
      AUTHENTIK_INSECURE: "true"
      AUTHENTIK_TOKEN: token
      AUTHENTIK_HOST_BROWSER: https://auth.site.com
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "echo", "health"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true