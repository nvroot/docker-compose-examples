services:
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: changedetection
    restart: unless-stopped
    volumes:
      - changedetection-data:/datastore
    environment:
      - PUID=1000
      - PGID=1000
      - 'BASE_URL=https://changedetection.example.com'
      - PLAYWRIGHT_DRIVER_URL=ws://playwright-chrome:3000/?stealth=1&--disable-web-security=true
      # Hides the `Referer` header so that monitored websites can't see the changedetection.io hostname.
      - HIDE_REFERER=true
    expose:
      - 5000
    networks:
      - changedetection-network
    depends_on:
      playwright-chrome:
        condition: service_started
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
      start_interval: 5s
  playwright-chrome:
    image: dgtlmoon/sockpuppetbrowser:latest
    # cap_add:
    #   - SYS_ADMIN
    # SYS_ADMIN might be too much, but it can be needed on your platform https://github.com/puppeteer/puppeteer/blob/main/docs/troubleshooting.md#running-puppeteer-on-gitlabci
    restart: unless-stopped
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - SCREEN_DEPTH=16
      - MAX_CONCURRENT_CHROME_PROCESSES=10
    networks:
      - changedetection-network
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  changedetection-network:
volumes:
  changedetection-data: