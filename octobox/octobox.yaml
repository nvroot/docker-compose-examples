services:
  app:
    image: octoboxio/octobox:latest
    container_name: octobox
    restart: unless-stopped
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=keybase
      - OCTOBOX_ATTRIBUTE_ENCRYPTION_KEY=encryptionkey # Generate on README
      - RAILS_SERVE_STATIC_FILES=1
      - GITHUB_CLIENT_ID=clientid
      - GITHUB_CLIENT_SECRET=clientsecret
      - OCTOBOX_DATABASE_NAME=octobox
      - OCTOBOX_DATABASE_USERNAME=octobox-user
      - OCTOBOX_DATABASE_PASSWORD=changeme
      - OCTOBOX_DATABASE_HOST=octobox-db
      - REDIS_URL=redis://octobox-redis:6379
    networks:
      - proxy
      - octobox-network
    depends_on:
      octobox-db:
        condition: service_healthy
      octobox-redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  octobox-db:
    image: "postgres:17"
    restart: unless-stopped
    environment:
      - POSTGRES_DB=octobox
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=octobox-user
      - POSTGRES_PORT=5432
    volumes:
      - "octobox-pg:/var/lib/postgresql/data"
    networks:
      - octobox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  octobox-redis:
    image: "redis:latest"
    restart: unless-stopped
    volumes:
      - "octobox-redis:/data"
    networks:
      - octobox-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
volumes:
  octobox-redis:
  octobox-pg:
networks:
  octobox-network:
    name: octobox-network
    driver: bridge
  proxy:
    external: true
