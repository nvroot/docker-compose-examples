services:
  jupyter-notebook:
    image: 'quay.io/jupyter/datascience-notebook:latest'
    container_name: jupyter
    restart: unless-stopped
    expose:
      - 8888
    volumes:
      - 'jupyter:/home/jovyan/work'
    command: "start-notebook.sh  --NotebookApp.token=password"
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
volumes:
  jupyter:
networks:
  proxy:
    external: true