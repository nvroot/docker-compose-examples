services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw
    restart: unless-stopped
    environment:
      - API_KEY=${OPENROUTER_API_KEY}
      - PROVIDER=openrouter
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_MODEL=openrouter/free
    volumes:
      - zeroclaw-data:/zeroclaw-data
      - ./config.toml:/zeroclaw-data/.zeroclaw/config.toml  
    expose:
      - 42617
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "zeroclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
volumes:
  zeroclaw-data:
networks:
  proxy:
    external: true