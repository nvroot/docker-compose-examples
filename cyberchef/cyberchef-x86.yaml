services:
  cyberchef:
    image: 'ghcr.io/gchq/cyberchef:latest'
    container_name: cyberchef
    restart: unless-stopped
    expose:
      - 80
    networks:
      - proxy
    volumes:
      - 'cyberchef-data:/app/data'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:80'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true