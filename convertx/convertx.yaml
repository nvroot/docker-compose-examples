services:
  convertx:
    image: ghcr.io/c4illin/convertx:latest
    container_name: convertx
    restart: unless-stopped
    environment:
      - JWT_SECRET=jwt-secret
    volumes:
      - "convertx:/app/data"
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bun"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  convertx: