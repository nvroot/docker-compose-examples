services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    environment:
      - 'MAIN_URL=${MAIN_URL}'
      - 'FRONTEND_URL=$FRONTEND_URL}'
      - 'NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}'
      - 'JWT_SECRET=${JWT_SECRET}'
      - 'DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postiz-db:5432/${POSTGRES_DB}'
      - 'REDIS_URL=${REDIS_URL}'
      - 'BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL}'
      - 'IS_GENERAL=${IS_GENERAL}'
      - 'STORAGE_PROVIDER=${STORAGE_PROVIDER}'
      - 'UPLOAD_DIRECTORY=${UPLOAD_DIRECTORY}'
      - 'NEXT_PUBLIC_UPLOAD_DIRECTORY=${NEXT_PUBLIC_UPLOAD_DIRECTORY}'
      - 'NX_ADD_PLUGINS=${NX_ADD_PLUGINS}'
      - 'EMAIL_PROVIDER=${EMAIL_PROVIDER}'
      - 'EMAIL_FROM_NAME=${EMAIL_FROM_NAME}'
      - 'EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}'
      - 'EMAIL_HOST=${EMAIL_HOST}'
      - 'EMAIL_PORT=${EMAIL_PORT}'
      - 'EMAIL_SECURE=${EMAIL_SECURE}'
      - 'EMAIL_USER=${EMAIL_USER}'
      - 'EMAIL_PASS=${EMAIL_PASS}'
      - 'DISABLE_REGISTRATION=${DISABLE_REGISTRATION}'
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    expose:
      - 5000
    networks:
      - postiz-network
      - proxy
    depends_on:
      postiz-db:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postiz-db:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
    volumes:
      - postiz-pg:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postiz-redis:
    image: redis:latest
    container_name: postiz-redis
    restart: unless-stopped
    networks:
      - postiz-network
    volumes:
      - postiz-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
volumes:
  postiz-pg:
  postiz-redis:
  postiz-config:
  postiz-uploads:
networks:
  postiz-network:
    name: postiz-network
    driver: bridge
  proxy:
    external: true
