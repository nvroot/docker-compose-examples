services:
  mysql:
    image: 'mysql:8'
    restart: unless-stopped
    volumes:
      - 'kimai-mysql-data:/var/lib/mysql'
    environment:
      - 'MYSQL_DATABASE=kimai'
      - 'MYSQL_USER=kimai-user'
      - 'MYSQL_PASSWORD=changeme'
      - 'MYSQL_ROOT_PASSWORD=changeme'
    command: '--default-storage-engine innodb'
    networks:
      - kimai-network
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-h'
        - 127.0.0.1
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  kimai:
    image: 'kimai/kimai2:apache-latest'
    container_name: kimai
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - 'kimai-data:/opt/kimai/var/data'
    environment:
      - 'APP_SECRET=app-secret'
      - 'MAILER_FROM=${MAILER_FROM:-kimai@example.com}'
      - 'MAILER_URL=${MAILER_URL:-null://null}'
      - 'ADMINMAIL=mail@example.com'
      - 'ADMINPASS=password'
      - 'DATABASE_URL=mysql://kimai-user:changeme@mysql/kimai?charset=utf8mb4&serverVersion=8.3.0'
      - TRUSTED_HOSTS=localhost
    networks:
      - kimai-network
      - proxy
    expose:
      - 8001
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:8001'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  kimai-network:
    name: kimai-network
    driver: bridge
  proxy:
    external: true