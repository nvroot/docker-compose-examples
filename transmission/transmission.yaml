services:
  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - USER=username
      - 'PASS=changeme'
    volumes:
      - ./config:/config
      - ./downloads:/downloads
      - ./watch:/watch
    networks:
      - proxy
    healthcheck:
      test: [
        "CMD",
        "curl",
        "-sSfL",
        "-u",
        "username:changeme",
        "http://localhost:9091/"
      ]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true