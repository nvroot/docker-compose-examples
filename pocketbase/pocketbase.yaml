services:
  pocketbase:
    image: 'ghcr.io/coollabsio/pocketbase:latest'
    container_name: pocketbase
    restart: unless-stopped
    volumes:
      - 'pocketbase-data:/app/pb_data'
      - 'pocketbase-hooks:/app/pb_hooks'
    expose:
      - 8080
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'pocketbase' || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  pocketbase-data:
  pocketbase-hooks:
