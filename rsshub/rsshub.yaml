services:
  rsshub:
    image: 'diygod/rsshub:chromium-bundled'
    container_name: rsshub
    restart: unless-stopped
    environment:
      - 'NODE_ENV=production'
    expose:
      - 1200
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:1200/healthz'
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
    networks:
      - proxy
networks:
  proxy:
    external: true
