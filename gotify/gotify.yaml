services:
  gotify:
    image: gotify/server:latest
    container_name: gotify
    restart: unless-stopped
    expose:
      - 80
    environment:
      - TZ=UTC
      - GOTIFY_DEFAULTUSER_PASS=custom
    volumes:
      - ./data:/app/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80 || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true