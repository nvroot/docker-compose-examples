services:
  marimo:
    image: ghcr.io/marimo-team/marimo:latest-sql
    container_name: marimo
    restart: unless-stopped
    environment:
      - TOKEN_PASSWORD=changeme  # Change
    volumes:
      - "marimo-data:/app"
    command:
      - "marimo"
      - "edit"
      - "--token-password"
      - "changeme"  # Change
      - "--port"
      - "8080"
      - "--host"
      - "0.0.0.0"
    expose:
      - 8080
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "uvx", "--with", "httpx[cli]", "httpx", "http://localhost:8080/health"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
volumes:
  marimo-data: