services:
  sshwifty:
    image: 'niruix/sshwifty:latest'
    container_name: sshwifty
    restart: unless-stopped
    environment:
      - TZ=UTC
      - SSHWIFTY_SHAREDKEY=changeme
    expose:
      - 8182
    networks:
      - proxy
    volumes:
      - './sshwifty:/sshwify'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8182/"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true