x-default-healthcheck: &default-healthcheck
  interval: 60s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s
services:
  prefect:
    image: 'prefecthq/prefect:3-latest-conda'
    container_name: prefect
    restart: unless-stopped
    networks:
      - prefect-network
      - proxy
    depends_on:
      postgresql:
        condition: service_healthy
    expose: [4200]
    environment:
      - 'PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB}'
      - 'PREFECT_API_KEY=${PREFECT_API_KEY}'
      - 'PREFECT_UI_API_URL=${PREFECT_UI_API_URL}'
      - 'PREFECT_UI_URL=${PREFECT_UI_URL}'
      - 'PREFECT_SERVER_API_CORS_ALLOWED_ORIGINS=${PREFECT_SERVER_API_CORS_ALLOWED_ORIGINS}'
      - 'PREFECT_EXPERIMENTAL_WARN=${PREFECT_EXPERIMENTAL_WARN}'
      - 'PREFECT_EXPERIMENTAL_ENABLE_SCHEDULE_CONCURRENCY=${PREFECT_EXPERIMENTAL_ENABLE_SCHEDULE_CONCURRENCY}'
      - 'PREFECT_RUNNER_SERVER_ENABLE=${PREFECT_RUNNER_SERVER_ENABLE}'
      - 'PREFECT_DEFAULT_WORK_POOL_NAME=${DEFAULT_POOL_NAME}'
    command:
      - prefect
      - server
      - start
      - '--host'
      - 0.0.0.0
      - '--port'
      - '4200'
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests as r;r.get('http://127.0.0.1:4200/api/health').raise_for_status()" ]
      <<: *default-healthcheck
  postgresql:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    networks:
      - prefect-network
    volumes:
      - 'pg-data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      <<: *default-healthcheck
  agent:
    image: 'prefecthq/prefect:3-python3.12'
    restart: unless-stopped
    networks:
      - prefect-network
    depends_on:
      prefect:
        condition: service_healthy
    entrypoint:
      - /opt/prefect/entrypoint.sh
      - prefect
      - worker
      - start
      - '--pool=${DEFAULT_POOL_NAME}'
      - '--with-healthcheck'
      - '--name=${DEFAULT_WORKER_NAME}'
      - '--limit=${DEFAULT_POOL_LIMIT}'
    environment:
      - 'PREFECT_API_URL=${PREFECT_API_URL}'
      - 'PREFECT_API_KEY=${PREFECT_API_KEY}'
      - 'PREFECT_UI_API_URL=${PREFECT_UI_API_URL}'
      - 'PREFECT_UI_URL=${PREFECT_UI_URL}'
      - 'PREFECT_SERVER_API_CORS_ALLOWED_ORIGINS=${PREFECT_SERVER_API_CORS_ALLOWED_ORIGINS}'
      - 'DEFAULT_POOL_NAME=${DEFAULT_POOL_NAME}'
      - 'DEFAULT_POOL_LIMIT=${DEFAULT_POOL_LIMIT}'
      - 'DEFAULT_WORKER_NAME=${DEFAULT_WORKER_NAME}'
    healthcheck:
      test: [ "CMD-SHELL", "pwd" ]
      <<: *default-healthcheck
networks:
  prefect-network:
    name: prefect-network
    driver: bridge
  proxy:
    external: true
volumes:
  pg-data: