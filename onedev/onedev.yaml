services:
  onedev:
    image: 1dev/server:latest
    container_name: onedev
    restart: unless-stopped
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - onedev-data:/opt/onedev
    environment:
      - hibernate_dialect=io.onedev.server.persistence.PostgreSQLDialect
      - hibernate_connection_driver_class=org.postgresql.Driver
      - hibernate_connection_url=jdbc:postgresql://postgres:5432/onedev
      - hibernate_connection_username=postgres
      - hibernate_connection_password=changeme
      - initial_user=admin
      - initial_password=adminpass
      - initial_email=admin@site.com
      - initial_server_url=https://one.site.com
      - initial_ssh_root_url=ssh://one.site.com
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - onedev-network
    healthcheck:
      test: ["CMD", "true"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
  postgres:
    image: postgres:17.0-bookworm
    restart: unless-stopped
    volumes:
      - onedev-postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=onedev
    networks:
      - onedev-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true
  onedev-network:
    name: onedev-network
    driver: bridge
volumes:
  onedev-data:
  onedev-postgresql:
