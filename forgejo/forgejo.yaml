services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    container_name: forgejo
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - RUN_MODE=prod
      - 'APP_NAME=My Forgejo'
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo-db:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo-user
      - FORGEJO__database__PASSWD=changeme
      - FORGEJO__server__DOMAIN=git.site.com
      - FORGEJO__server__SSH_DOMAIN=git.site.com
      - FORGEJO__server__ROOT_URL=https://git.site.com
      - FORGEJO__server__SSH_PORT=2222
    volumes:
      - forgejo-data:/data
    networks:
      - forgejo-network
      - proxy
    ports:
      - 2222:22
    expose:
      - 3000
    depends_on:
      forgejo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s

  forgejo-db:
    image: "postgres:latest"
    restart: unless-stopped
    environment:
      - POSTGRES_DB=forgejo
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=forgejo-user
      - POSTGRES_PORT=5432
    volumes:
      - "forgejo-db:/var/lib/postgresql/data"
    networks:
      - forgejo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
      start_interval: 5s
networks:
  forgejo-network:
    name: forgejo-network
    driver: bridge
  proxy:
    external: true
volumes:
  forgejo-data:
  forgejo-db: