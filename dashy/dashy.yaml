services:
  dashy:
    image: lissy93/dashy:latest
    contrainer_name: dashy
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - NODE_ENV=production
      - TZ=UTC
    networks:
      - proxy
    # volumes:
    # - './dashy/conf.yml:/app/public/conf.yml'
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
      start_interval: 5s
networks:
  proxy:
    external: true